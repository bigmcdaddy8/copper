schema_version: 2
notes: XSP 0DTE Put Credit Spread - ~13 delta short put, $2 wing, no TP - let it expire
enabled: true
environment: TRDS
underlying: XSP

trade:
  option_strategy: PCS

  entry_constraints:
    allow_multiple_trades: false
    quantity: 1
    max_entries_per_day: 1
    max_risk_dollars: 500.0

  entry_criteria:
    type: time_window
    allowed_entry_after: "08:55" # Chicago time
    allowed_entry_before: "09:21" # Chicago time

  entry_order:
    order_type: LIMIT
    time_in_force: DAY
    max_fill_wait_time_seconds: 120
    max_entry_attempts: 5
    retry_price_decrement: 0.02
    entry_price: MIDPOINT
    min_credit_received: 0.08

  leg_selection:
    short_put:
      delta_preferred: -0.13
      delta_range:
        min: -0.15
        max: -0.10
    long_put:
      wing_distance_points: 2.0

  exit_order:
    exit_type: NONE
