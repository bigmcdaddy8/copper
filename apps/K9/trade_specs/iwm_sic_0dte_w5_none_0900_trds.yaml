schema_version: 2
notes: IWM 0DTE Short Iron Condor - ~25 delta shorts, $5 wings, no TP - let expire
enabled: true
environment: TRDS
underlying: IWM

trade:
  option_strategy: SIC

  entry_constraints:
    allow_multiple_trades: false
    quantity: 1
    max_entries_per_day: 100
    max_risk_dollars: 1000.0

  entry_criteria:
    type: time_window
    allowed_entry_after: "08:55" # Chicago time
    allowed_entry_before: "13:21" # Chicago time

  entry_order:
    order_type: LIMIT
    time_in_force: DAY
    max_fill_wait_time_seconds: 120
    max_entry_attempts: 5
    retry_price_decrement: 0.55
    entry_price: MIDPOINT + 2.50
    min_credit_received: 0.34

  leg_selection:
    short_put:
      delta_preferred: -0.35
      delta_range:
        min: -0.48
        max: -0.13
    long_put:
      wing_distance_points: 5.0
    short_call:
      delta_preferred: 0.35
      delta_range:
        min: 0.13
        max: 0.48
    long_call:
      wing_distance_points: 5.0

  exit_order:
    exit_type: NONE
